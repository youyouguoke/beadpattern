name = "bead-pattern-ai"
main = "src/index.ts"
compatibility_date = "2026-01-21"
account_id = "b183c58c7fa8b50d9a8a8e6ac8d42a31"

# Static assets for the backend (optional, can be empty)
[assets]
directory = "./public"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "beadpatternai-db"
database_id = "c21e9fb5-5b72-44d1-9aae-acd9a92a821f"
migrations_dir = "./src/migrations"

[[r2_buckets]]
binding = "R2"
bucket_name = "beadpatternai"

# [[queues.producers]]
# binding = "BULK_QUEUE"
# queue = "beadpatternai-bulk-queue"

# [[queues.consumers]]
# queue = "beadpatternai-bulk-queue"
# max_batch_size = 5
# max_batch_timeout = 30

[vars]
APP_ORIGIN = "http://localhost:3000"
SITE_NAME = "BeadPatternAI"
# ADMIN_API_KEY should be set via `wrangler secret put ADMIN_API_KEY` for production.
R2_PUBLIC_URL = "https://pub-98e050954fa34ccebe6d2e8911f520a3.r2.dev"
